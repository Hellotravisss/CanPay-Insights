<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="Helvetica, Arial, sans-serif">
  <rect width="1200" height="630" fill="#ffffff"/>
  <rect width="1200" height="12" fill="#dc2626"/>

  <!-- brand -->
  <g transform="translate(64, 70)">
    <rect width="40" height="40" rx="8" fill="#dc2626"/>
    <g fill="#ffffff" transform="translate(8,7)">
      <rect x="9" y="0" width="6" height="5" rx="1"/>
      <rect x="2" y="6" width="20" height="6" rx="1.5"/>
      <rect x="8" y="13" width="8" height="5" rx="1"/>
      <rect x="3" y="19" width="18" height="5" rx="1.5"/>
    </g>
    <text x="56" y="28" font-size="26" font-weight="bold" fill="#0f172a">CanPay <tspan fill="#dc2626" font-weight="normal">Insights</tspan></text>
  </g>

  <!-- headline -->
  <text x="64" y="220" font-size="62" font-weight="bold" fill="#0f172a">Canada Child Benefit</text>
  <text x="64" y="292" font-size="62" font-weight="bold" fill="#0f172a">Increase <tspan fill="#dc2626">2026</tspan></text>

  <text x="64" y="352" font-size="30" fill="#475569">New benefit year, new maximums — starting with the July 20 payment.</text>

  <!-- badge -->
  <g transform="translate(64, 392)">
    <rect width="430" height="52" rx="26" fill="#fee2e2"/>
    <text x="30" y="34" font-size="24" font-weight="bold" fill="#991b1b">First payment: July 20, 2026 · +2%</text>
  </g>

  <!-- amounts -->
  <g transform="translate(64, 488)">
    <text x="0" y="0" font-size="20" fill="#64748b">Maximum per child, per year (tax-free)</text>
    <rect x="0" y="20" width="520" height="40" rx="6" fill="#dc2626"/>
    <text x="16" y="46" font-size="20" font-weight="bold" fill="#ffffff">Under 6:  $8,157/yr  ($679.75/mo)</text>
    <rect x="550" y="20" width="470" height="40" rx="6" fill="#cbd5e1"/>
    <text x="566" y="46" font-size="20" font-weight="bold" fill="#334155">Ages 6–17:  $6,883/yr  ($573.58/mo)</text>
  </g>

  <text x="64" y="600" font-size="20" fill="#94a3b8">canpayinsights.ca — free Canadian take-home pay calculator</text>
</svg>
