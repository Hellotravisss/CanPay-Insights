<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="Helvetica, Arial, sans-serif">
  <rect width="1200" height="630" fill="#ffffff"/>
  <rect width="1200" height="12" fill="#dc2626"/>

  <!-- brand -->
  <g transform="translate(64, 70)">
    <rect width="40" height="40" rx="8" fill="#dc2626"/>
    <g fill="#ffffff" transform="translate(8,7)">
      <rect x="9" y="0" width="6" height="5" rx="1"/>
      <rect x="2" y="6" width="20" height="6" rx="1.5"/>
      <rect x="8" y="13" width="8" height="5" rx="1"/>
      <rect x="3" y="19" width="18" height="5" rx="1.5"/>
    </g>
    <text x="56" y="28" font-size="26" font-weight="bold" fill="#0f172a">CanPay <tspan fill="#dc2626" font-weight="normal">Insights</tspan></text>
  </g>

  <!-- headline -->
  <text x="64" y="220" font-size="62" font-weight="bold" fill="#0f172a">Canada Workers</text>
  <text x="64" y="292" font-size="62" font-weight="bold" fill="#0f172a">Benefit <tspan fill="#dc2626">2026</tspan></text>

  <text x="64" y="352" font-size="30" fill="#475569">Advance payments for working Canadians — July 10, October, January.</text>

  <!-- badge -->
  <g transform="translate(64, 392)">
    <rect width="470" height="52" rx="26" fill="#fee2e2"/>
    <text x="30" y="34" font-size="24" font-weight="bold" fill="#991b1b">2026 max: $1,665 single · $2,869 family</text>
  </g>

  <!-- amounts -->
  <g transform="translate(64, 488)">
    <text x="0" y="0" font-size="20" fill="#64748b">Advance instalment (based on 2025 return)</text>
    <rect x="0" y="20" width="430" height="40" rx="6" fill="#dc2626"/>
    <text x="16" y="46" font-size="20" font-weight="bold" fill="#ffffff">Single:  up to ~$272 / instalment</text>
    <rect x="460" y="20" width="430" height="40" rx="6" fill="#cbd5e1"/>
    <text x="476" y="46" font-size="20" font-weight="bold" fill="#334155">Family:  up to ~$469 / instalment</text>
  </g>

  <text x="64" y="600" font-size="20" fill="#94a3b8">canpayinsights.ca — free Canadian take-home pay calculator</text>
</svg>
